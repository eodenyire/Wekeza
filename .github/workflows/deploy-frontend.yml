name: Deploy Frontend to Netlify

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Portals/wekeza-unified-shell/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Portals/wekeza-unified-shell/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Portals/wekeza-unified-shell/package-lock.json'

      - name: Install dependencies
        working-directory: Portals/wekeza-unified-shell
        run: npm ci

      - name: Lint
        working-directory: Portals/wekeza-unified-shell
        run: npm run lint --if-present || true

      - name: Type check
        working-directory: Portals/wekeza-unified-shell
        run: npx tsc --noEmit

      - name: Build
        working-directory: Portals/wekeza-unified-shell
        run: npm run build

      - name: Deploy to Netlify (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: 'Portals/wekeza-unified-shell/dist'
          production-branch: main
          production-deploy: true
          deploy-message: 'Deploy from GitHub Actions'
          enable-pull-request-comment: true
          enable-commit-comment: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          netlify-config-path: 'Portals/wekeza-unified-shell/netlify.toml'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy to Netlify (Preview)
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: 'Portals/wekeza-unified-shell/dist'
          production-branch: main
          production-deploy: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Artifact Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: Portals/wekeza-unified-shell/dist
          retention-days: 7

      - name: Build Status
        run: echo "✅ Frontend build and deployment successful!"
