name: Deploy Frontend to Vercel

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Portals/wekeza-unified-shell/**'
      - '.github/workflows/deploy-vercel.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Portals/wekeza-unified-shell/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Portals/wekeza-unified-shell/package-lock.json'

      - name: Install dependencies
        working-directory: Portals/wekeza-unified-shell
        run: npm ci

      - name: Lint
        working-directory: Portals/wekeza-unified-shell
        run: npm run lint --if-present || true

      - name: Type check
        working-directory: Portals/wekeza-unified-shell
        run: npx tsc --noEmit

      - name: Build
        working-directory: Portals/wekeza-unified-shell
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:8080' }}
          VITE_AUTH_MODE: ${{ vars.VITE_AUTH_MODE || 'mock' }}
          VITE_ENABLE_MOCK_DATA: ${{ vars.VITE_ENABLE_MOCK_DATA || 'true' }}
          VITE_ENVIRONMENT: production

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./Portals/wekeza-unified-shell
          vercel-args: '--prod'

      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./Portals/wekeza-unified-shell

      - name: Upload Build Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: Portals/wekeza-unified-shell/dist
          retention-days: 7

      - name: Build Status
        run: echo "✅ Frontend build and Vercel deployment successful!"
