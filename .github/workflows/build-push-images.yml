name: Build & Push Docker Images

# Builds all Docker images and pushes them to GitHub Container Registry (GHCR)
# so that anyone can `docker pull ghcr.io/eodenyire/wekeza/wekeza-api:latest`
# and get a ready-to-run image without having to build from source.

on:
  push:
    branches:
      - main
      - develop
      - 'copilot/**'
    tags:
      - 'v*.*.*'
  workflow_dispatch:          # allow manual trigger from GitHub UI
    inputs:
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  ORG: eodenyire
  REPO: wekeza

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build and push wekeza-api (.NET 10)
  # ─────────────────────────────────────────────────────────────────────────────
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.REPO }}/wekeza-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: APIs/v1-Core
          file: APIs/v1-Core/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Build and push wekeza-frontend (React + nginx)
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.REPO }}/wekeza-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: Portals/wekeza-unified-shell
          file: Portals/wekeza-unified-shell/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_AUTH_MODE=real
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Create image manifest (summary of what was published)
  # ─────────────────────────────────────────────────────────────────────────────
  summarize:
    name: Publish summary
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    if: always()

    steps:
      - name: Write job summary
        run: |
          echo "## 🐳 Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.REPO }}/wekeza-api\` | \`${{ needs.build-api.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.REPO }}/wekeza-frontend\` | \`${{ needs.build-frontend.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull and run" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.REPO }}/wekeza-api:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.REPO }}/wekeza-frontend:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Or use docker compose:" >> $GITHUB_STEP_SUMMARY
          echo "git clone https://github.com/${{ env.ORG }}/${{ env.REPO }}.git" >> $GITHUB_STEP_SUMMARY
          echo "cd ${{ env.REPO }}" >> $GITHUB_STEP_SUMMARY
          echo "docker compose -f docker-compose.full.yml up -d" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
