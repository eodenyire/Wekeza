version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wekeza-postgres
    environment:
      POSTGRES_DB: WekezaCoreDB
      POSTGRES_USER: wekeza_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-WekeZa2026!SecurePass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - wekeza-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wekeza_app -d WekezaCoreDB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Wekeza Core API v1 (Production)
  api:
    build:
      context: ./APIs/v1-Core
      dockerfile: Dockerfile
    container_name: wekeza-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=WekezaCoreDB;Username=wekeza_app;Password=${DB_PASSWORD:-WekeZa2026!SecurePass}"
      JwtSettings__Secret: ${JWT_SECRET:-WekeZa-BaNk-PrOdUcTiOn-SeCrEt-KeY-2026-ChAnGe-ThIs-In-PrOd!}
      JwtSettings__Issuer: ${JWT_ISSUER:-https://api.wekeza.com}
      JwtSettings__Audience: ${JWT_AUDIENCE:-https://wekeza.com}
      MpesaConfig__ConsumerKey: ${MPESA_CONSUMER_KEY}
      MpesaConfig__ConsumerSecret: ${MPESA_CONSUMER_SECRET}
      MpesaConfig__ShortCode: ${MPESA_SHORTCODE}
      MpesaConfig__PassKey: ${MPESA_PASSKEY}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wekeza-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

  # Wekeza Unified Portal Shell — React + Nginx
  frontend:
    build:
      context: ./Portals/wekeza-unified-shell
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_AUTH_MODE: ${VITE_AUTH_MODE:-real}
    image: wekeza-frontend:local
    container_name: wekeza-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - wekeza-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Wekeza ERMS — Enterprise Risk Management System API
  erms:
    build:
      context: ./WekezaERMS
      dockerfile: Dockerfile
    image: wekeza-erms:local
    container_name: wekeza-erms
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      UseInMemoryDatabase: "false"
      ConnectionStrings__ERMSConnection: "Host=postgres;Port=5432;Database=WekezaERMS;Username=wekeza_app;Password=${DB_PASSWORD:-WekeZa2026!SecurePass}"
      JwtSettings__Secret: ${ERMS_JWT_SECRET:-WekezaERMS-PrOdUcTiOn-SeCrEt-KeY-2026-ChAnGe-ThIs-In-PrOd!}
      JwtSettings__Issuer: ${ERMS_JWT_ISSUER:-WekezaERMS}
      JwtSettings__Audience: ${ERMS_JWT_AUDIENCE:-WekezaERMS-Users}
      JwtSettings__ExpiryMinutes: "480"
    ports:
      - "${ERMS_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wekeza-network
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1388 ' /proc/net/tcp6 2>/dev/null || grep -q ':1388 ' /proc/net/tcp 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # pgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wekeza-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wekeza.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - wekeza-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    restart: unless-stopped
    profiles:
      - tools

networks:
  wekeza-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  pgadmin-data:
    driver: local
