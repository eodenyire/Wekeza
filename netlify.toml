# Root-level Netlify configuration — routes the whole-repo deployment to the
# React portal (Portals/wekeza-unified-shell).
#
# If Netlify is connected to the repository root (rather than the subdirectory),
# this file ensures the portal is built and served as the production site.

[build]
  base    = "Portals/wekeza-unified-shell"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION  = "10"

# Redirect API calls to the backend
[[redirects]]
  from   = "/api/*"
  to     = "http://localhost:8080/:splat"
  status = 200
  force  = true

# SPA routing — serve index.html for all remaining paths so React Router works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache static assets for a long time
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; connect-src 'self' http://localhost:8080 https:;"
