# Wekeza Bank — Nginx Ingress Controller on Kubernetes
# Requires: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.9.5/deploy/static/provider/cloud/deploy.yaml
# Or for Minikube: minikube addons enable ingress
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wekeza-ingress
  namespace: wekeza-bank
  labels:
    app.kubernetes.io/part-of: wekeza-banking-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "90"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  rules:
    # ── Frontend ─────────────────────────────────────────────────────────────
    - host: wekeza.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wekeza-frontend-service
                port:
                  number: 3000

    # ── API + Swagger ─────────────────────────────────────────────────────────
    - host: api.wekeza.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wekeza-api-service
                port:
                  number: 8080
---
# NodePort service for quick local access without a full ingress controller
# Access: http://<minikube-ip>:30080  (frontend)
#         http://<minikube-ip>:30088  (api)
apiVersion: v1
kind: Service
metadata:
  name: wekeza-frontend-nodeport
  namespace: wekeza-bank
  labels:
    app.kubernetes.io/part-of: wekeza-banking-system
spec:
  type: NodePort
  selector:
    app: wekeza-frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: wekeza-api-nodeport
  namespace: wekeza-bank
  labels:
    app.kubernetes.io/part-of: wekeza-banking-system
spec:
  type: NodePort
  selector:
    app: wekeza-api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30088
      name: http
