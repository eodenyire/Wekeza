services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wekeza-v1-postgres
    environment:
      POSTGRES_DB: WekezaCoreDB
      POSTGRES_USER: wekeza_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-WekeZa2026!SecurePass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-v1-data:/var/lib/postgresql/data
    networks:
      - wekeza-v1-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wekeza_app -d WekezaCoreDB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: wekeza-v1-redis
    ports:
      - "6379:6379"
    networks:
      - wekeza-v1-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Wekeza Core API v1
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wekeza-v1-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=WekezaCoreDB;Username=wekeza_app;Password=${DB_PASSWORD:-WekeZa2026!SecurePass}"
      ConnectionStrings__Redis: "redis:6379"
      Redis__ConnectionString: "redis:6379"
      JwtSettings__Secret: ${JWT_SECRET:-WekeZa-BaNk-PrOdUcTiOn-SeCrEt-KeY-2026-ChAnGe-ThIs-In-PrOd!}
      JwtSettings__Issuer: ${JWT_ISSUER:-https://api.wekeza.com}
      JwtSettings__Audience: ${JWT_AUDIENCE:-https://wekeza.com}
      MpesaConfig__ConsumerKey: ${MPESA_CONSUMER_KEY}
      MpesaConfig__ConsumerSecret: ${MPESA_CONSUMER_SECRET}
      MpesaConfig__ShortCode: ${MPESA_SHORTCODE}
      MpesaConfig__PassKey: ${MPESA_PASSKEY}
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wekeza-v1-network
    restart: unless-stopped

volumes:
  postgres-v1-data:

networks:
  wekeza-v1-network:
    driver: bridge
