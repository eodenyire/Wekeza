# Wekeza Minimal API - Docker Compose
# Lightweight minimal implementation for resource-constrained environments

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wekeza-minimal-postgres
    environment:
      POSTGRES_DB: WekezaCoreDB
      POSTGRES_USER: wekeza_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-WekeZa2026!SecurePass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5435:5432"
    volumes:
      - postgres-minimal-data:/var/lib/postgresql/data
    networks:
      - wekeza-minimal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wekeza_app -d WekezaCoreDB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Note: Add Minimal API service here when available
  # api:
  #   build:
  #     context: ./MinimalWekezaApi
  #     dockerfile: Dockerfile
  #   container_name: wekeza-minimal-api
  #   ports:
  #     - "9082:8080"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - wekeza-minimal-network

volumes:
  postgres-minimal-data:

networks:
  wekeza-minimal-network:
    driver: bridge
