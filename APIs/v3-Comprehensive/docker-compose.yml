# Wekeza Comprehensive API - Docker Compose
# Full-featured comprehensive API implementation

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wekeza-comprehensive-postgres
    environment:
      POSTGRES_DB: WekezaCoreDB
      POSTGRES_USER: wekeza_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-WekeZa2026!SecurePass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - postgres-comprehensive-data:/var/lib/postgresql/data
    networks:
      - wekeza-comprehensive-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wekeza_app -d WekezaCoreDB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Note: Add Comprehensive API service here when available
  # api:
  #   build:
  #     context: ./ComprehensiveWekezaApi
  #     dockerfile: Dockerfile
  #   container_name: wekeza-comprehensive-api
  #   ports:
  #     - "9081:8080"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - wekeza-comprehensive-network

volumes:
  postgres-comprehensive-data:

networks:
  wekeza-comprehensive-network:
    driver: bridge
